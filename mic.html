<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Compose Modal</title>
    <style>
        /* Aapka Original CSS (Bina kisi badlav ke) */
        :root { --bg-body: #02060c; --bg-modal: #0b1424; --input-bg: #121d2f; --accent-cyan: #00bcd4; --text-gray: #7a869a; --border-color: #1c2b41; }
        body { background-color: var(--bg-body); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .modal { background-color: var(--bg-modal); width: 600px; border-radius: 12px; padding: 24px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid var(--border-color); }
        .header { display: flex; align-items: center; margin-bottom: 25px; font-size: 18px; font-weight: 600; }
        .header svg { margin-right: 10px; fill: var(--accent-cyan); }
        .close-btn { position: absolute; right: 20px; top: 20px; color: var(--text-gray); cursor: pointer; font-size: 20px; }
        .field-label { font-size: 12px; color: var(--text-gray); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; }
        input, textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px 15px; color: white; box-sizing: border-box; outline: none; }
        textarea { height: 120px; resize: none; font-size: 14px; line-height: 1.5; }
        .mic-container { text-align: center; margin: 30px 0; }
        .mic-button { width: 70px; height: 70px; background: var(--accent-cyan); border-radius: 50%; border: none; cursor: pointer; box-shadow: 0 0 20px rgba(0, 188, 212, 0.4); display: flex; justify-content: center; align-items: center; margin: 0 auto; transition: 0.3s; }
        .mic-button.listening { animation: pulse 1.5s infinite; background: #ff3b3b; box-shadow: 0 0 20px rgba(255, 59, 59, 0.4); }
        .mic-instruction { color: var(--text-gray); font-size: 13px; margin-top: 10px; }
        .footer-btns { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        .btn { padding: 14px 0; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 15px; border: none; display: flex; align-items: center; justify-content: center; flex: 1; transition: 0.2s; }
        .btn-ai { background: rgba(255, 255, 255, 0.05); color: #d1d5db; border: 1px solid var(--border-color); }
        .btn-send { background: #00899b; color: white; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="modal">
        <span class="close-btn" onclick="window.location.href='dashboard.html'">✕</span>
        
        <div class="header">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            Voice Compose
        </div>

        <div class="input-group">
            <div class="field-label">To</div>
            <input type="email" id="email-to" placeholder="recipient@email.com">
        </div>

        <div class="input-group">
            <div class="field-label">Subject</div>
            <input type="text" id="email-subject" placeholder="What is this about?">
        </div>

        <div class="mic-container">
            <button class="mic-button" id="mic-trigger">
                <svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <div class="mic-instruction" id="mic-status">Tap mic to start recording</div>
        </div>

        <div class="input-group">
            <div class="field-label">Message</div>
            <textarea id="email-message" placeholder="Aap apni zubaan mein bolein, AI use English kar dega..."></textarea>
        </div>

        <div class="footer-btns">
            <button class="btn btn-ai" onclick="improveAI()">🪄 AI Improve</button>
            <button class="btn btn-send" onclick="sendEmail()">🚀 Send</button>
        </div>
    </div>

<script>
const micBtn = document.getElementById('mic-trigger');
const statusText = document.getElementById('mic-status');
const messageArea = document.getElementById('email-message');
const subjectArea = document.getElementById('email-subject');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let isListening = false;
let recognition;

if (SpeechRecognition) {

    recognition = new SpeechRecognition();

    // 🔥 Best setting for Hindi + Urdu + English in Roman output
    recognition.lang = 'EN-IN';

    recognition.continuous = true;
    recognition.interimResults = true;

    let finalTranscript = '';

    micBtn.onclick = () => {

        if (!isListening) {
            finalTranscript = ''; // reset every new recording
            recognition.start();
            isListening = true;
            micBtn.classList.add('listening');
            statusText.innerText = "Listening... Bolna shuru karein";
        } else {
            recognition.stop();
            isListening = false;
            micBtn.classList.remove('listening');
            statusText.innerText = "Stopped. Tap again to record.";
        }
    };

    recognition.onresult = (event) => {

        let interimTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {

            let transcript = event.results[i][0].transcript.trim();

            // 🔥 Double word prevention
            if (event.results[i].isFinal) {

                if (!finalTranscript.endsWith(transcript + " ")) {
                    finalTranscript += transcript + " ";
                }

            } else {
                interimTranscript = transcript;
            }
        }

        // 🔥 Real-time update (no repetition)
        messageArea.value = (finalTranscript + interimTranscript)
            .replace(/\s+/g, ' ')   // extra spaces remove
            .trim();
    };

    recognition.onerror = (event) => {
        micBtn.classList.remove('listening');
        isListening = false;
        statusText.innerText = "Error: " + event.error;
    };

    recognition.onend = () => {
        if (isListening) {
            recognition.start(); // auto-restart to prevent audio cut
        }
    };

} else {
    statusText.innerText = "Browser not supported";
}

    
 // --- 2. Advanced AI Translation & Improvement (Updated) ---
async function improveAI() {

    const rawText = messageArea.value.trim();
    if (!rawText) return alert("Pehle message likho ya bolo.");

    statusText.innerText = "✨ AI improving...";

    const API_KEY = "AIzaSyBBVg1wVljQ3xiXLxN_fV0mBZJYA9DSCtw";

    try {
        // --- Updated URL and Fetch Logic ---
const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, 
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            contents: [{
                parts: [{
                    text: "Convert the following WhatsApp style message into a professional, grammatically correct English email without extra explanation. Give only the improved text:\n\n" + rawText
                }]
            }]
        })
    }
);

        const data = await response.json();

        console.log("API RESPONSE:", data);

        if (data.candidates && data.candidates.length > 0) {
            messageArea.value = data.candidates[0].content.parts[0].text;
            statusText.innerText = "✅ Improved Successfully!";
        } else {
            statusText.innerText = "⚠️ No response from AI";
        }

    } catch (error) {
        console.error(error);
        statusText.innerText = "❌ AI Error!";
    }
}

        // --- 3. Real Storage Sync (Dashboard Connection) ---
        function sendEmail() {
            const to = document.getElementById('email-to').value;
            if(!to) return alert("Recipient's email is required!");

            const newEmail = {
                id: Date.now(),
                sender: "Me",
                receiver: to,
                subject: subjectArea.value || "No Subject",
                message: messageArea.value,
                status: 'sent', // Sent box mein jayega
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            // LocalStorage mein save karna
            let allEmails = JSON.parse(localStorage.getItem('allEmails')) || [];
            allEmails.unshift(newEmail); // Sabse upar add karo
            localStorage.setItem('allEmails', JSON.stringify(allEmails));

            alert("🚀 Email sent successfully!");
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
