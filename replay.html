<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Detail - AI Assistant</title>
    <style>
        :root {
            --bg-dark: #050a12;
            --card-bg: #0d1625;
            --input-bg: #121d2f;
            --accent-cyan: #00bcd4;
            --text-gray: #94a3b8;
            --danger-red: #3b1e1e;
            --text-red: #ef4444;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .email-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background: #1a273a;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 15px;
        }

        /* User Info */
        .subject-line { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        
        .sender-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 45px; height: 45px;
            background: #006064;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
        .sender-details div { font-size: 14px; }
        .sender-email { color: var(--text-gray); font-size: 12px; }

        /* Message Body */
        .message-box {
            background: var(--input-bg);
            padding: 20px;
            border-radius: 12px;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 100px;
            border: 1px solid #1e293b;
        }

        /* Action Buttons Grid */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            transition: 0.2s;
        }

        .btn-secondary { background: #1a273a; }
        .btn-secondary:hover { background: #24344d; }
        .btn-delete { background: var(--danger-red); color: var(--text-red); }
        .btn-delete:hover { background: #5a2626; }

        /* Smart Replies */
        .smart-replies-title {
            font-size: 12px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .smart-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .chip {
            background: rgba(0, 188, 212, 0.1);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }
        /* reply.html ke <style> section ke andar sabse niche */
.btn-long {
    grid-column: 1 / -1; /* Dono columns ko cover karega */
    background: linear-gradient(90deg, #00bcd4, #006064) !important;
    margin-top: 10px;
}
    </style>
</head>
<body>

    <div class="email-container" id="email-page">
        <div class="header">
            <button class="back-btn">←</button>
            <span>Email Detail</span>
        </div>

        <div class="subject-line">Project Picnic Update</div>

        <div class="sender-info">
            <div class="avatar">AS</div>
            <div class="sender-details">
                <div>Ansari Shabnam</div>
                <div class="sender-email">ansarifarzana730@gmail.com</div>
            </div>
        </div>

        <div class="message-box" id="email-body"></div>

       <div class="actions-grid">
    <button class="btn btn-secondary" onclick="speakText()">
        🔊 Speak
    </button>
    
    <button class="btn btn-secondary" onclick="manualReply()">
        ↩️ Reply
    </button>

    <button class="btn btn-long" onclick="improveUnderstand()">
        🪄 Improve Understanding (Hindi AI)
    </button>
    
</div>

        <div class="smart-replies-title">Smart Replies</div>
        <div class="smart-chips">
            <div class="chip" onclick="quickSend('Thank you for your email!')">Thank you for your email!</div>
            <div class="chip" onclick="quickSend('I\'ll review and get back to you.')">I'll review and get back to you.</div>
            <div class="chip" onclick="quickSend('Sounds good!')">Sounds good!</div>
        </div>
    </div>

    <script>
        // 1. Text to Speech (Speaker Function)
        function speakText() {
            const text = document.getElementById('email-body').innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; // Thoda natural sound ke liye slow rate
            window.speechSynthesis.speak(utterance);
        }

async function improveUnderstand() {
    // 1. Pura email text nikalna
    const emailBox = document.getElementById('email-body');
    const rawText = emailBox.innerText;

    // 2. Apni Nayi API Key yahan dalo (Jo aapne abhi banayi hai)
    const API_KEY = "YOUR_NEW_GEMINI_KEY"; 

    alert("AI is analyzing the email meaning...");

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: "Read this email and explain its core meaning in very simple, easy-to-understand Hindi for someone who doesn't know English well: " + rawText
                        }]
                    }]
                })
            }
        );

        const data = await response.json();

        if (data.candidates && data.candidates[0].content.parts[0].text) {
            const hindiExplanation = data.candidates[0].content.parts[0].text;

            // Purani explanation box ko hatana agar hai toh
            const existingBox = document.querySelector('.ai-hindi-box');
            if(existingBox) existingBox.remove();

            // Naya explanation box screen par dikhana
            const infoBox = document.createElement('div');
            infoBox.className = "ai-hindi-box";
            infoBox.style.cssText = "margin-top:15px; padding:15px; background:#1e293b; border:1px solid #00bcd4; border-radius:12px; color:#22d3ee; font-size:14px; line-height:1.6;";
            infoBox.innerHTML = `<strong>🤖 AI Meaning (Hindi):</strong><br>${hindiExplanation}`;
            
            emailBox.appendChild(infoBox);
        }
    } catch (err) {
        console.error(err);
        alert("AI Connection Error! Please check your internet or API Key.");
    }
}




    </script>
    <script>
    // 1. Dashboard se aane wala data load karna
    window.onload = function() {
        const rawData = localStorage.getItem('replyToData');
        if (rawData) {
            const replyData = JSON.parse(rawData);
            
            // Subject line ko update karna (Dashboard se aaya hua subject)
            if(replyData.subject) {
                document.querySelector('.subject-line').innerText = replyData.subject;
            }
            
            // Sender email ko update karna
            if(replyData.to) {
                document.querySelector('.sender-email').innerText = replyData.to;
            }
            if(replyData.message) {
    document.getElementById('email-body').innerHTML = `
        <div style="border-left:3px solid #00bcd4; padding-left:10px;">
            <strong>Original Message:</strong><br><br>
            ${replyData.message}
        </div>
    `;
}
            
            // Kaam hone ke baad temporary data clear karein
            // localStorage.removeItem('replyToData'); 
        }
    };

    // 2. Back Button functionality
    document.querySelector('.back-btn').onclick = function() {
        window.location.href = 'dashboard.html';
    };

    // 3. Text to Speech (Speaker Function)
    function speakText() {
        const text = document.getElementById('email-body').innerText;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }


    // 5. Manual Reply (Navigate to Mic page for voice reply)
    function manualReply() {
        window.location.href = 'mic.html';
    }


    function quickSend(msg) {
        alert("Sending Quick Reply: " + msg);
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
