<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocaMail - Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Aapka original CSS - No Changes */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #020617; color: white; min-height: 100vh; padding: 20px; }
    .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
    .back-btn { background: #1e293b; border: none; color: white; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 18px; transition: 0.3s; }
    .back-btn:hover { background: #334155; }
    .header h2 { font-size: 24px; font-weight: 600; }
    .settings-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 25px; }
    .card-title { display: flex; align-items: center; gap: 10px; color: #94a3b8; font-size: 14px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
    .card-title i { color: #22d3ee; }
    .form-group { margin-bottom: 20px; }
    label { display: block; color: #64748b; font-size: 13px; margin-bottom: 8px; font-weight: 500; }
    input { width: 100%; background: #020617; border: 1px solid #1e293b; border-radius: 12px; padding: 12px 15px; color: white; font-size: 15px; outline: none; transition: 0.3s; }
    input:focus { border-color: #22d3ee; box-shadow: 0 0 10px rgba(34, 211, 238, 0.1); }
    .btn { background: #22d3ee; color: #020617; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 211, 238, 0.3); }
    .btn-outline { background: #1e293b; color: white; }
    .btn-danger { width: 100%; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); justify-content: center; margin-bottom: 50px; }
    .slider-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
    .rate-value { color: #22d3ee; font-weight: bold; }
    input[type="range"] { -webkit-appearance: none; height: 6px; background: #1e293b; border-radius: 5px; width: 100%; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #22d3ee; border-radius: 50%; cursor: pointer; border: 4px solid #0f172a; }
    .slider-labels { display: flex; justify-content: space-between; color: #64748b; font-size: 11px; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="settings-container">
    <div class="header">
      <button class="back-btn" onclick="window.location.href='dashboard.html'">
        <i class="fas fa-arrow-left"></i>
      </button>
      <h2>Settings</h2>
    </div>

    <div class="card">
      <div class="card-title"><i class="fas fa-user"></i> Edit Profile</div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="prof-name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="prof-email" readonly style="color: #64748b; cursor: not-allowed;">
      </div>
      <button class="btn" onclick="saveProfile()"><i class="fas fa-save"></i> Save Profile</button>
    </div>

    <div class="card">
      <div class="card-title"><i class="fas fa-sliders-h"></i> Voice Speed</div>
      <div class="slider-header">
        <label>TTS Playback Rate</label>
        <span class="rate-value" id="speedVal">1.0x</span>
      </div>
      <input type="range" min="0.5" max="2.0" step="0.1" value="1.0" id="speedRange">
      <div class="slider-labels">
        <span>0.5x Slow</span>
        <span>1.0x Normal</span>
        <span>2.0x Fast</span>
      </div>
      <button class="btn btn-outline" style="margin-top:20px;" onclick="saveVoiceSettings()"><i class="fas fa-save"></i> Save Speed</button>
    </div>

    <button class="btn btn-danger" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>

  <script>
    // --- Safe Initialization ---
    document.addEventListener('DOMContentLoaded', function() {
        // User data fill karein
        const userData = localStorage.getItem('currentUser');
        if (userData) {
            const user = JSON.parse(userData);
            if(document.getElementById('prof-name')) document.getElementById('prof-name').value = user.name || "";
            if(document.getElementById('prof-email')) document.getElementById('prof-email').value = user.email || "";
        }

        // Voice speed load karein
        const savedSpeed = localStorage.getItem('voiceSpeed') || "1.0";
        const slider = document.getElementById('speedRange');
        const output = document.getElementById('speedVal');
        
        if (slider && output) {
            slider.value = savedSpeed;
            output.innerText = parseFloat(savedSpeed).toFixed(1) + "x";
            
            // Slider Logic (Live Update)
            slider.oninput = function() {
                output.innerHTML = parseFloat(this.value).toFixed(1) + "x";
            }
        }
    });

    // --- Save Profile ---
    function saveProfile() {
        const nameInput = document.getElementById('prof-name');
        if(!nameInput) return;

        const newName = nameInput.value.trim();
        if(!newName) return alert("Please enter a name.");

        let user = JSON.parse(localStorage.getItem('currentUser'));
        if(user) {
            user.name = newName;
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            // Sync with all users list
            let allUsers = JSON.parse(localStorage.getItem('users')) || [];
            allUsers = allUsers.map(u => u.email === user.email ? {...u, name: newName} : u);
            localStorage.setItem('users', JSON.stringify(allUsers));
            
            alert("Profile updated!");
        }
    }

    // --- Save Voice Speed ---
    function saveVoiceSettings() {
        const slider = document.getElementById('speedRange');
        if(slider) {
            localStorage.setItem('voiceSpeed', slider.value);
            alert("Speed saved: " + slider.value + "x");
        }
    }

    // --- Logout ---
    function logout() {
        if(confirm("Logout from VocaMail?")) {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    }
  </script>
</body>
</html>
